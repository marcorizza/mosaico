repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (mosaico-sdk-py)
        entry: bash -c "cd mosaico-sdk-py && poetry run ruff check --fix ."
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format (mosaico-sdk-py)
        entry: bash -c "cd mosaico-sdk-py && poetry run ruff format ."
        language: system
        types: [python]
        pass_filenames: false
