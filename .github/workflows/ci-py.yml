
name: Python SDK

on:
  push:
    branches: ["main"]
    paths:
      - "**.py"
      - "**/pyproject.toml"
      - "**/poetry.lock"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "**/pyproject.toml"
      - "**/poetry.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-analysis:
    name: "Static analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Python SDK Lint
        run: |
          pipx install ruff
          ruff format --check mosaico-sdk-py
          ruff check mosaico-sdk-py


  unit-tests:
    name: "Unit tests on (Py ${{ matrix.python-version }})"
    needs: [static-analysis]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    runs-on: ubuntu-24.04
    env:
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v6
      - name: Install Poetry
        run: pipx install poetry
      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
      - name: Unit Tests
        run: ./scripts/tests --sdk-python

